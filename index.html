        dailyReviewed: (resetDaily ? 0 : globalStats.dailyReviewed) + sessionTotal,
        dailyDate: today, streak: newStreak, streakDate: today
      };
      setGlobalStats(ns); statsRef.current = ns; persist(srsRef.current, ns);
      if (dailyMode && (ns.dailyNew < DAILY_NEW_GOAL || ns.dailyReviewed < DAILY_REVIEW_GOAL)) {
        var pool = hskFilter === 0 ? ALL_ITEMS : ALL_ITEMS.filter(function(c) { return c.hsk === hskFilter; });
        var dnr = Math.max(0, DAILY_NEW_GOAL - ns.dailyNew);
        var built = buildPile(srsRef.current, pool, dnr);

  var rot = isDragging ? dragX * 0.06 : swipeDir === "right" ? 12 : swipeDir === "left" ? -12 : 0;

          </div>

          <DailyBar />

            <div style={{ fontSize: current.type === "word" ? (current.char.length > 3 ? 32 : 48) : 96, lineHeight: 1, color: T.text, marginBottom: 10 }}>{current.char}</div>

          <div style={{ position: "relative", marginBottom: 28, animation: "bounceIn 0.4s ease-out" }}>
            {testMode === "reverse" ? (
              <div style={{ fontSize: 22, lineHeight: 1.4, color: T.text, fontWeight: 500, textAlign: "center" }}>{lang === "fr" ? current.fr : (current.en || current.fr)}</div>
            ) : testMode === "fill" ? (
              <div style={{ fontSize: 22, lineHeight: 1.4, color: T.text, fontWeight: 500, textAlign: "center" }}>
                {fillLoading ? "..." : fillSentence ? fillSentence.sentence : "..."}
                {fillSentence && fillSentence.sentencePinyin && <div style={{ fontSize: 13, color: T.accent, marginTop: 6 }}>{fillSentence.sentencePinyin}</div>}
              </div>
            ) : (
              <div style={{ fontSize: charSize(current), lineHeight: 1, color: T.text, fontWeight: 300 }}>{current.char}</div>
            )}
            <div style={{ position: "absolute", top: -8, right: -12 }}><MasteryDots level={srs[current.id] ? srs[current.id].mastery : 0} size={5} dimColor={T.dotDim} /></div>
          </div>

          {(testMode === "qcm_pinyin" || testMode === "qcm_sens") && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, width: "100%", maxWidth: 300 }}>
              {choices.map(function(c, i) { return (
                <button key={i} onClick={function() { handleAnswer(c, i); }} style={{ padding: "16px 12px", background: choiceState[i] === "correct" ? T.correctBg : choiceState[i] === "wrong" ? T.wrongBg : T.card, border: "2px solid " + (choiceState[i] === "correct" ? T.green : choiceState[i] === "wrong" ? T.red : T.cardBorder), borderRadius: 12, cursor: answered ? "default" : "pointer", color: choiceState[i] === "correct" ? T.green : choiceState[i] === "wrong" ? T.red : T.text, fontSize: testMode === "qcm_sens" ? 13 : 17, fontWeight: 500, fontFamily: "inherit", transition: "all 0.15s", animation: choiceState[i] === "wrong" ? "shakeX 0.4s" : choiceState[i] === "correct" ? "correctPulse 0.6s" : "fadeIn 0.25s ease-out " + (i*0.06) + "s both" }}>{c}</button>
              ); })}
            </div>
          )}

          {testMode === "fill" && !fillLoading && fillSentence && fillSentence.choices && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, width: "100%", maxWidth: 340 }}>
              {choices.map(function(c, i) { return (
                <button key={i} onClick={function() { handleAnswer(c, i); }} style={{ padding: "12px 10px", textAlign: "center", background: choiceState[i] === "correct" ? T.correctBg : choiceState[i] === "wrong" ? T.wrongBg : T.card, border: "2px solid " + (choiceState[i] === "correct" ? T.green : choiceState[i] === "wrong" ? T.red : T.cardBorder), borderRadius: 12, cursor: answered ? "default" : "pointer", fontFamily: "inherit", transition: "all 0.15s", animation: choiceState[i] === "wrong" ? "shakeX 0.4s" : choiceState[i] === "correct" ? "correctPulse 0.6s" : "fadeIn 0.25s ease-out " + (i*0.08) + "s both" }}>
                  <div style={{ fontSize: 20, fontWeight: 600, color: choiceState[i] === "correct" ? T.green : choiceState[i] === "wrong" ? T.red : T.text, marginBottom: 2 }}>{c.zh}</div>
                  <div style={{ fontSize: 11, color: T.accent }}>{c.pinyin}</div>
                  <div style={{ fontSize: 10, color: T.textSoft, marginTop: 2 }}>{c.tr}</div>
                </button>
              ); })}
            </div>
          )}

          {(testMode === "input_pinyin" || testMode === "reverse") && (
            <div style={{ width: "100%", maxWidth: 300 }}>
              <input ref={inputRef} type="text" value={inputValue} onChange={function(e) { setInputValue(e.target.value); }} onKeyDown={function(e) { if (e.key === "Enter") handleInputSubmit(); }} disabled={inputSubmitted} placeholder={testMode === "reverse" ? L.reverseHint : "ex: dà, da..."} autoComplete="off" autoCapitalize="off" spellCheck={false}
                style={{ width: "100%", padding: "16px 18px", fontSize: 20, fontWeight: 500, fontFamily: "inherit", textAlign: "center", letterSpacing: 1, background: inputSubmitted ? (wasCorrect ? T.correctBg : T.wrongBg) : T.inputBg, border: "2px solid " + (inputSubmitted ? (wasCorrect ? T.green : T.red) : T.inputBorder), borderRadius: 12, outline: "none", color: inputSubmitted ? (wasCorrect ? T.green : T.red) : T.text, transition: "all 0.2s" }} />
              {inputSubmitted && !wasCorrect && (
                <div style={{ marginTop: 10, textAlign: "center" }}>
                  <div style={{ fontSize: 12, color: T.textSoft, marginBottom: 2 }}>{L.correctAnswer}</div>
                  <div style={{ fontSize: 20, fontWeight: 600, color: T.green }}>{current.pinyin}</div>
                </div>
              )}
              {!inputSubmitted && (
                <button onClick={handleInputSubmit} style={{ width: "100%", marginTop: 12, padding: 14, background: T.btnPri, border: "none", borderRadius: 12, color: T.btnPriTxt, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{L.validate}</button>
              )}
            </div>
          )}

          {answered && (
            <div style={{ width: "100%", maxWidth: 300, marginTop: 20 }}>
              <div style={{ padding: "16px 20px", background: T.card, border: "1px solid " + T.cardBorder, borderRadius: 12, textAlign: "center", marginBottom: 12, animation: "slideUp 0.3s ease-out" }}>
                <div style={{ fontSize: 11, color: T.textSoft, marginBottom: 4 }}>{wasCorrect ? L.resultCorrect : L.resultWrong}</div>
                {testMode === "fill" && fillSentence && (
                  <div style={{ marginBottom: 8, padding: "8px 12px", background: T.progressBg, borderRadius: 8 }}>
                    <div style={{ fontSize: 16, color: T.text, fontWeight: 500 }}>{fillSentence.full}</div>
                    {fillSentence.fullPinyin && <div style={{ fontSize: 12, color: T.accent, marginTop: 2 }}>{fillSentence.fullPinyin}</div>}
                  </div>
                )}
                <div style={{ fontSize: 24, color: T.accent, fontWeight: 500, marginBottom: 2 }}>{current.pinyin}</div>
                <div style={{ marginTop: 4, marginBottom: 4, display: "flex", justifyContent: "center" }}><SpeakBtn text={current.char} size={28} /></div>
                <div style={{ fontSize: 14, color: T.textMuted }}>{lang === "fr" ? "🇫🇷" : "🇬🇧"} {lang === "fr" ? current.fr : (current.en || current.fr)}</div>
              </div>
              <button onClick={goNext} style={{ width: "100%", padding: 14, background: T.btnPri, border: "none", borderRadius: 12, color: T.btnPriTxt, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{L.next}</button>
            </div>
          )}
        </div>
      )}

      {/* REVEAL */}
      {phase === "reveal" && current && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "0 24px", position: "relative" }}>
          <button onClick={function() { setPhase("home"); }} style={{ position: "absolute", top: 16, left: 16, background: "none", border: "none", fontSize: 18, color: T.textSoft, cursor: "pointer" }}>←</button>
          <DailyBar />
          <div style={{ fontSize: 12, color: T.textSoft, marginBottom: 20 }}>{L.revealMsg}</div>
          <div style={{ width: "100%", maxWidth: 300, padding: "28px 24px", background: T.card, border: "1px solid " + T.cardBorder, borderRadius: 16, textAlign: "center", boxShadow: "0 2px 8px " + T.shadow, animation: "scaleIn 0.3s ease-out" }}>
            <div style={{ fontSize: current.type === "word" ? (current.char.length > 3 ? 28 : 40) : 72, lineHeight: 1, color: T.text, marginBottom: 10, fontWeight: 300 }}>{current.char}</div>
            <div style={{ marginBottom: 6, display: "flex", justifyContent: "center" }}><SpeakBtn text={current.char} size={30} /></div>
            <div style={{ fontSize: 22, color: T.accent, fontWeight: 500, marginBottom: 8 }}>{current.pinyin}</div>
            <div style={{ fontSize: 16, color: T.textMuted, marginBottom: 12 }}>{lang === "fr" ? "🇫🇷" : "🇬🇧"} {lang === "fr" ? current.fr : (current.en || current.fr)}</div>
            <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <MasteryDots level={srs[current.id] ? srs[current.id].mastery : 0} dimColor={T.dotDim} />
              <span style={{ fontSize: 11, color: MASTERY_COLORS[srs[current.id] ? srs[current.id].mastery : 0], fontWeight: 500 }}>↓ {L.mastery[srs[current.id] ? srs[current.id].mastery : 0]}</span>
            </div>
            {current.type !== "word" && <div style={{ height: 1, background: T.sep, margin: "0 12px 12px" }} />}
            {current.type !== "word" && <div style={{ fontSize: 10, fontWeight: 600, color: T.textSoft, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>{L.compounds}</div>}
            {current.type !== "word" && current.words && current.words.map(function(w, i) { return <div key={i} style={{ fontSize: 13, color: T.textMuted, lineHeight: 2 }}>{translateWord(w, lang)}</div>; })}
          </div>
          <div style={{ fontSize: 11, color: T.textSoft, marginTop: 12 }}>{L.willReturn}</div>
          <button onClick={goNext} style={{ marginTop: 16, padding: "14px 40px", background: T.btnPri, border: "none", borderRadius: 12, color: T.btnPriTxt, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{L.next}</button>
        </div>
      )}

      {/* DONE */}
      {phase === "done" && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "0 28px" }}>
          <div style={{ fontSize: 36, marginBottom: 8, animation: "bounceIn 0.5s ease-out" }}>🎉</div>
          <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 4 }}>{L.doneTitle}</div>
          <div style={{ fontSize: 13, color: T.textSoft, marginBottom: 28 }}>{L.session} #{globalStats.totalSessions}</div>
          <div style={{ width: "100%", maxWidth: 280, display: "flex", flexDirection: "column", gap: 6 }}>
            {[
              { icon: "✅", label: L.correct, val: sessionCorrect, color: T.green },
              { icon: "📝", label: L.tested, val: sessionTotal, color: T.text },
              ...(sessionNew > 0 ? [{ icon: "🆕", label: L.newItems, val: sessionNew, color: T.accent }] : []),
              ...(bestCombo >= 3 ? [{ icon: "🔥", label: "Best combo", val: bestCombo, color: T.accent }] : []),
            ].map(function(s, i) { return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", background: T.card, border: "1px solid " + T.cardBorder, borderRadius: 10, animation: "slideUp 0.3s ease-out " + (i*0.08) + "s both" }}>
                <div style={{ fontSize: 16, width: 28, textAlign: "center" }}>{s.icon}</div>
                <div style={{ flex: 1, fontSize: 14, color: T.textMuted }}>{s.label}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: s.color }}>{s.val}</div>
              </div>
            ); })}
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
            <button onClick={function() { start(hskFilter); }} style={{ padding: "14px 28px", background: T.btnPri, border: "none", borderRadius: 12, color: T.btnPriTxt, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{L.replay}</button>
            <button onClick={function() { setPhase("home"); }} style={{ padding: "14px 28px", background: T.card, border: "1px solid " + T.cardBorder, borderRadius: 12, color: T.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{L.collectionBtn}</button>
          </div>
        </div>
      )}

      {/* DAILY DONE */}
      {phase === "daily_done" && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "0 28px" }}>
          <div style={{ fontSize: 48, marginBottom: 12, animation: "bounceIn 0.5s ease-out" }}>🏆</div>
          <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 6 }}>{L.dailyComplete}</div>
          <div style={{ width: "100%", maxWidth: 280, padding: "18px 20px", background: T.card, border: "1px solid " + T.cardBorder, borderRadius: 14, textAlign: "center", marginTop: 20 }}>
            <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
              <div style={{ textAlign: "center" }}><div style={{ fontSize: 28, fontWeight: 700, color: T.green }}>{globalStats.dailyNew}</div><div style={{ fontSize: 10, color: T.textSoft }}>🆕 {L.dailyNew}</div></div>
              <div style={{ width: 1, background: T.cardBorder }} />
              <div style={{ textAlign: "center" }}><div style={{ fontSize: 28, fontWeight: 700, color: "#3B82F6" }}>{globalStats.dailyReviewed}</div><div style={{ fontSize: 10, color: T.textSoft }}>📝 {L.dailyReview}</div></div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
            <button onClick={function() { setPhase("home"); }} style={{ padding: "14px 28px", background: T.btnPri, border: "none", borderRadius: 12, color: T.btnPriTxt, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{L.dailyBack}</button>
            <button onClick={function() { start(0, true); }} style={{ padding: "14px 28px", background: T.card, border: "1px solid " + T.cardBorder, borderRadius: 12, color: T.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{L.dailyContinue}</button>
          </div>
        </div>
      )}

      {/* COLLECTION */}
      {phase === "collection" && (
        <div style={{ minHeight: "100vh", padding: "16px 16px 24px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <button onClick={function() { setPhase("home"); }} style={{ background: "none", border: "none", fontSize: 18, color: T.textSoft, cursor: "pointer" }}>←</button>
            <div style={{ fontSize: 15, fontWeight: 700 }}>{L.collection}</div>
            <div style={{ fontSize: 13, color: T.green, fontWeight: 600 }}>{discoveredTotal}/{ALL_ITEMS.length}</div>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap", justifyContent: "center" }}>
            {L.mastery.map(function(label, i) { return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 9, color: T.textSoft }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: MASTERY_COLORS[i] }} />{label}
              </div>
            ); })}
          </div>
          <div style={{ marginBottom: 12 }}>
            <input type="text" value={collSearch} onChange={function(e) { setCollSearch(e.target.value); }} placeholder={lang === "fr" ? "🔍 Chercher..." : "🔍 Search..."} autoComplete="off" style={{ width: "100%", padding: "10px 14px", fontSize: 14, fontFamily: "inherit", background: T.inputBg, border: "1px solid " + T.inputBorder, borderRadius: 10, outline: "none", color: T.text }} />
          </div>
          {[1, 2, 3].map(function(hsk) {
            var q = collSearch.toLowerCase().trim();
            var nq = normalizePinyin(q);
            var matchItem = function(c) {
              if (!q) return srs[c.id] && srs[c.id].mastery > 0;
              return c.char.includes(q) || normalizePinyin(c.pinyin).includes(nq) || (c.fr || "").toLowerCase().includes(q) || (c.en || "").toLowerCase().includes(q);
            };
            var items = ALL_ITEMS.filter(function(c) { return c.hsk === hsk && matchItem(c); });
            var chars = items.filter(function(c) { return c.type === "char"; });
            var words = items.filter(function(c) { return c.type === "word"; });
            if (items.length === 0) return null;
            return (
              <div key={hsk} style={{ marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: hskColor(hsk) }}>HSK {hsk}</div>
                  <div style={{ flex: 1, height: 1, background: T.sep }} />
                  <div style={{ fontSize: 10, color: T.textSoft }}>{items.length}</div>
                </div>
                {chars.length > 0 && (
                  <div>
                    <div style={{ fontSize: 10, color: T.textSoft, marginBottom: 6, fontWeight: 600 }}>{L.collChars}</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6, marginBottom: 12 }}>
                      {chars.map(function(c) { var m = srs[c.id] ? srs[c.id].mastery : 0; return (
                        <div key={c.id} onClick={function() { setSelectedCard(c); }} style={{ background: T.card, border: "1px solid " + MASTERY_COLORS[m] + "33", borderRadius: 10, padding: "8px 2px", textAlign: "center", cursor: "pointer" }}>
                          <div style={{ fontSize: 24, lineHeight: 1, marginBottom: 2 }}>{c.char}</div>
                          <div style={{ fontSize: 8, color: T.textSoft, marginBottom: 2 }}>{c.pinyin}</div>
                          <MasteryDots level={m} size={3} dimColor={T.dotDim} />
                        </div>
                      ); })}
                    </div>
                  </div>
                )}
                {words.length > 0 && (
                  <div>
                    <div style={{ fontSize: 10, color: T.textSoft, marginBottom: 6, fontWeight: 600 }}>{L.collWords}</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginBottom: 12 }}>
                      {words.map(function(c) { var m = srs[c.id] ? srs[c.id].mastery : 0; return (
                        <div key={c.id} onClick={function() { setSelectedCard(c); }} style={{ background: T.card, border: "1px solid " + MASTERY_COLORS[m] + "33", borderRadius: 10, padding: "8px 6px", textAlign: "center", cursor: "pointer" }}>
                          <div style={{ fontSize: 15, lineHeight: 1.2, marginBottom: 2, fontWeight: 500 }}>{c.char}</div>
                          <div style={{ fontSize: 8, color: T.textSoft, marginBottom: 2 }}>{c.pinyin}</div>
                          <MasteryDots level={m} size={3} dimColor={T.dotDim} />
                        </div>
                      ); })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          {selectedCard && (
            <div onClick={function() { setSelectedCard(null); }} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24, animation: "fadeIn 0.2s ease-out" }}>
              <div onClick={function(e) { e.stopPropagation(); }} style={{ width: "100%", maxWidth: 320, background: T.card, borderRadius: 20, padding: "28px 24px", textAlign: "center", maxHeight: "80vh", overflowY: "auto", animation: "scaleIn 0.25s ease-out" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <MasteryDots level={srs[selectedCard.id] ? srs[selectedCard.id].mastery : 0} dimColor={T.dotDim} />
                    <span style={{ fontSize: 10, color: MASTERY_COLORS[srs[selectedCard.id] ? srs[selectedCard.id].mastery : 0], fontWeight: 500 }}>{L.mastery[srs[selectedCard.id] ? srs[selectedCard.id].mastery : 0]}</span>
                  </div>
                  <button onClick={function() { setSelectedCard(null); }} style={{ background: "none", border: "none", fontSize: 18, color: T.textSoft, cursor: "pointer" }}>✕</button>
                </div>
                <div style={{ fontSize: selectedCard.type === "word" ? (selectedCard.char.length > 3 ? 36 : 48) : 80, lineHeight: 1, color: T.text, marginBottom: 8 }}>{selectedCard.char}</div>
                <div style={{ marginBottom: 12 }}><SpeakBtn text={selectedCard.char} size={36} /></div>
                <div style={{ fontSize: 22, color: T.accent, fontWeight: 500, marginBottom: 8 }}>{selectedCard.pinyin}</div>
                <div style={{ fontSize: 16, color: T.textMuted, marginBottom: 4 }}>{lang === "fr" ? "🇫🇷" : "🇬🇧"} {lang === "fr" ? selectedCard.fr : (selectedCard.en || selectedCard.fr)}</div>
                {selectedCard.type !== "word" && selectedCard.words && (
                  <div>
                    <div style={{ height: 1, background: T.sep, margin: "14px 0 10px" }} />
                    <div style={{ fontSize: 10, fontWeight: 600, color: T.textSoft, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>{L.collExamples}</div>
                    {selectedCard.words.map(function(w, i) { return <div key={i} style={{ fontSize: 14, color: T.textMuted, lineHeight: 2 }}>{translateWord(w, lang)}</div>; })}
                  </div>
                )}
                <div style={{ display: "inline-block", marginTop: 12, padding: "3px 10px", background: hskColor(selectedCard.hsk) + "22", borderRadius: 6, fontSize: 11, fontWeight: 600, color: hskColor(selectedCard.hsk) }}>HSK {selectedCard.hsk}</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(HanziSwipe));
  </script>
</body>
</html>
