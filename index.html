HSK_WORDS.forEach(function(w) { WORD_EN[w.word] = w.en || w.fr; });
const translateWord = function(w, toLang) {
  if (toLang === "fr") return w;
  var m = w.match(/^(.+?)\s+(.+?)\s*=\s*(.+)$/);
  if (!m) return w;
  var en = WORD_EN[m[1]];
  return en ? m[1] + " " + m[2] + " = " + en : w;
};

// Get all item IDs for a lesson
var getLessonItems = function(lesson) {
  var items = [];
  lesson.chars.forEach(function(ch) {
    var found = ALL_ITEMS.find(function(it) { return it.id === ch; });
    if (found) items.push(found);
  });
  lesson.words.forEach(function(w) {
    var found = ALL_ITEMS.find(function(it) { return it.id === "w_" + w; });
    if (found) items.push(found);
  });
  return items;
};

// Check if a lesson is completed (all items seen at least once)
var isLessonDone = function(lesson, srsData) {
  if (isMilestone(lesson) || isExam(lesson)) {
    return srsData["_lesson_" + lesson.id] && srsData["_lesson_" + lesson.id].mastery > 0;
  }
  var items = getLessonItems(lesson);
  return items.length > 0 && items.every(function(it) { return srsData[it.id] && srsData[it.id].mastery > 0; });
};

// Get next uncompleted lesson
var getNextLesson = function(srsData) {
  for (var i = 0; i < LESSONS.length; i++) {
    if (!isLessonDone(LESSONS[i], srsData)) return LESSONS[i];
  }
  return null;
};

// Check if a lesson is unlocked (previous is done, or it's the first)
var isLessonUnlocked = function(lesson, srsData) {
  if (lesson.id === 1) return true;
  // Exams are always accessible (skip ahead if you have the level)
  var hskL = LESSONS.filter(function(l) { return l.hsk === lesson.hsk; });
  if (lesson.id === hskL[hskL.length - 1].id) return true;
  var prev = LESSONS.find(function(l) { return l.id === lesson.id - 1; });
  return prev ? isLessonDone(prev, srsData) : true;
};

// Get first lesson id of a given HSK level
var getHskStart = function(hsk) {
  for (var i = 0; i < LESSONS.length; i++) { if (LESSONS[i].hsk === hsk) return LESSONS[i].id; }
  return 1;
};

// Check if lesson is a milestone (every 5th within its HSK)
var isMilestone = function(lesson) {
  var offset = lesson.id - getHskStart(lesson.hsk) + 1;
  var hskLessons = LESSONS.filter(function(l) { return l.hsk === lesson.hsk; });
  var isLast = lesson.id === hskLessons[hskLessons.length - 1].id;
  if (isLast) return false; // last is exam, not milestone
  return offset > 1 && offset % 5 === 0;
};

// Check if lesson is the HSK exam (last lesson of its HSK level)
var isExam = function(lesson) {
  var hskLessons = LESSONS.filter(function(l) { return l.hsk === lesson.hsk; });
  return lesson.id === hskLessons[hskLessons.length - 1].id;
};

// Get the previous 4 lessons (for milestones)
var getMilestoneLessons = function(lesson) {
  var result = [];
  for (var i = 1; i <= 4; i++) {
    var prev = LESSONS.find(function(l) { return l.id === lesson.id - i; });
    if (prev && prev.hsk === lesson.hsk) result.push(prev);
  }
  return result;
};

// Get all lessons for a HSK level
var getHskLessons = function(hsk) {
  return LESSONS.filter(function(l) { return l.hsk === hsk; });
};

  7: { zh: "这是我的书。我有一个朋友。我在家。", pinyin: "Zhè shì wǒ de shū. Wǒ yǒu yī gè péngyou. Wǒ zài jiā.", fr: "C'est mon livre. J'ai un ami. Je suis à la maison.", en: "This is my book. I have a friend. I am at home." },
  8: { zh: "今天我在家。明天我去学校。现在我吃饭。", pinyin: "Jīntiān wǒ zài jiā. Míngtiān wǒ qù xuéxiào. Xiànzài wǒ chī fàn.", fr: "Aujourd'hui je suis à la maison. Demain je vais à l'école. Maintenant je mange.", en: "Today I am at home. Tomorrow I go to school. Now I eat." },
  9: { zh: "我有三个朋友。我买五个苹果。他有十本书。", pinyin: "Wǒ yǒu sān gè péngyou. Wǒ mǎi wǔ gè píngguǒ. Tā yǒu shí běn shū.", fr: "J'ai trois amis. J'achète cinq pommes. Il a dix livres.", en: "I have three friends. I buy five apples. He has ten books." },

  12: { zh: "我吃米饭。我喝水。我喜欢茶。", pinyin: "Wǒ chī mǐfàn. Wǒ hē shuǐ. Wǒ xǐhuan chá.", fr: "Je mange du riz. Je bois de l'eau. J'aime le thé.", en: "I eat rice. I drink water. I like tea." },
  13: { zh: "我在家。我去学校。他在饭店。", pinyin: "Wǒ zài jiā. Wǒ qù xuéxiào. Tā zài fàndiàn.", fr: "Je suis à la maison. Je vais à l'école. Il est au restaurant.", en: "I am at home. I go to school. He is at the restaurant." },
  14: { zh: "这个人很好。她很漂亮。水很热。", pinyin: "Zhège rén hěn hǎo. Tā hěn piàoliang. Shuǐ hěn rè.", fr: "Cette personne est bien. Elle est jolie. L'eau est chaude.", en: "This person is nice. She is pretty. The water is hot." },

  17: { zh: "这个男人是医生，这个女人是老师。他们有一个孩子。他们都是好人。", pinyin: "Zhège nánrén shì yīshēng, zhège nǚrén shì lǎoshī. Tāmen yǒu yī gè háizi. Tāmen dōu shì hǎo rén.", fr: "Cet homme est médecin, cette femme est professeur. Ils ont un enfant. Ce sont tous de bonnes personnes.", en: "This man is a doctor, this woman is a teacher. They have a child. They are all good people." },

var hasClaudeStorage = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";

var saveData = async function(srsData, gStats, darkMode, langPref) {
  var payload = JSON.stringify({ srs: srsData, stats: gStats, dark: darkMode, lang: langPref, savedAt: Date.now() });
  try {
    if (hasClaudeStorage) await window.storage.set(KEY, payload);
    else localStorage.setItem(KEY, payload);
  } catch (e) { console.error("Save failed:", e); }
};

var loadData = async function() {
  try {
    if (hasClaudeStorage) {
      var result = await window.storage.get(KEY);
      if (result && result.value) return JSON.parse(result.value);
    } else {
      var raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    }
  } catch (e) { console.log("No saved data found"); }
  return null;
};

var clearData = async function() {
  try {
    if (hasClaudeStorage) await window.storage.delete(KEY);
    else localStorage.removeItem(KEY);
  } catch (e) { console.error("Clear failed:", e); }
};

          : accuracy >= 70
          ? (lang === "fr" ? "Bien joué ! Quelques mots à retravailler mais tu progresses vite. On continue ?" : "Well done! A few words to revisit but you're progressing fast. Shall we continue?")
          : (lang === "fr" ? "Bonne session ! Ces mots reviendront en révision, la répétition espacée va tout ancrer. On continue ?" : "Good session! These words will come back in review — spaced repetition will lock them in. Continue?");

        var downloadImage = function() {
          var canvas = document.createElement("canvas");
          var ctx = canvas.getContext("2d");
          var w = 1080, pad = 48;
          var cols = items.length <= 8 ? 4 : items.length <= 12 ? 4 : 4;
          var rows = Math.ceil(items.length / cols);
          var cellW = Math.floor((w - pad * 2) / cols);
          var cellH = 140;
          var headerH = 160, footerH = 100;
          var h = headerH + rows * cellH + footerH;
          canvas.width = w; canvas.height = h;

          // Fond crème
          ctx.fillStyle = "#F8F0E8";
          ctx.fillRect(0, 0, w, h);

          // Header — logo + HSK + streak
          ctx.fillStyle = "#DE2910";
          ctx.font = "bold 28px system-ui";
          ctx.textAlign = "left";
          ctx.fillText("HANZI SWIPE", pad, 60);

          ctx.fillStyle = "#9C9488";
          ctx.font = "18px system-ui";
          ctx.fillText("HSK " + lesson.hsk + " · " + title, pad, 90);

          // Streak à droite
          ctx.fillStyle = "#1A1615";
          ctx.font = "bold 32px system-ui";
          ctx.textAlign = "right";
          ctx.fillText("🔥 " + (globalStats.streak || 0), w - pad, 72);

          // Séparateur
          ctx.fillStyle = "#E8D8C8";
          ctx.fillRect(pad, 110, w - pad * 2, 1);

          // Grille — caractères seulement, fond blanc cassé
          items.forEach(function(it, i) {
            var c2 = i % cols, row2 = Math.floor(i / cols);
            var x = pad + c2 * cellW, y = headerH + row2 * cellH;
            var cx = x + cellW / 2, cy = y + cellH / 2;

            // Cellule
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.beginPath();
            ctx.roundRect(x + 8, y + 8, cellW - 16, cellH - 16, 14);
            ctx.fill();

            // Caractère
            ctx.fillStyle = "#1A1615";
            ctx.font = "bold 64px system-ui";
            ctx.textAlign = "center";
            ctx.fillText(it.char, cx, cy + 22);
          });

          // Séparateur footer
          ctx.fillStyle = "#E8D8C8";
          ctx.fillRect(pad, h - footerH + 10, w - pad * 2, 1);

          // Stats footer
          var statsY = h - footerH + 55;
          var thirds = (w - pad * 2) / 3;

          ctx.font = "bold 32px system-ui"; ctx.textAlign = "center";
          ctx.fillStyle = "#1A1615"; ctx.fillText(sessionNew, pad + thirds * 0.5, statsY);
          ctx.fillStyle = "#1A1615"; ctx.fillText(discoveredTotal, pad + thirds * 1.5, statsY);
          ctx.fillStyle = "#DE2910"; ctx.fillText(accuracy + "%", pad + thirds * 2.5, statsY);

          ctx.font = "14px system-ui";
          ctx.fillStyle = "#9C9488";
          ctx.fillText(lang === "fr" ? "nouveaux" : "new", pad + thirds * 0.5, statsY + 24);
          ctx.fillText(lang === "fr" ? "mots appris" : "words learned", pad + thirds * 1.5, statsY + 24);
          ctx.fillText(lang === "fr" ? "précision" : "accuracy", pad + thirds * 2.5, statsY + 24);

          var link = document.createElement("a");
          link.download = "hanzi-swipe-L" + lesson.id + ".png";
          link.href = canvas.toDataURL("image/png");
          link.style.display = "none";
          document.body.appendChild(link);
          link.click();
          setTimeout(function() { document.body.removeChild(link); }, 100);
        };

        var handleRecapToXuexue = async function() {
          setMingChatOpen(true);
          setMingMessages([]);
          setMingTyping(true);
          setPhase("ming");
          try {
            var items2 = getLessonItems(lesson);
            var errList = lessonErrors.slice(0, 5).map(function(e) { return e.char + " (" + e.pinyin + " = " + (lang === "fr" ? e.fr : (e.en || e.fr)) + ", " + e.count + " error" + (e.count > 1 ? "s" : "") + ")"; }).join(", ");
            var wordsList = items2.slice(0, 8).map(function(it) { return it.char + " (" + it.pinyin + " = " + (lang === "fr" ? it.fr : (it.en || it.fr)) + ")"; }).join(", ");
            var nl3 = getNextLesson(srsRef.current);
            var nextWord = nl3 ? getLessonItems(nl3).slice(0, 1).map(function(it) { return it.char + " (" + it.pinyin + " = " + (lang === "fr" ? it.fr : (it.en || it.fr)) + ")"; }).join("") : "";
            var recapDetail = "Lesson " + lesson.id + " (" + title + ", HSK" + lesson.hsk + ") just completed. " +
              "Score: " + accuracy + "%, " + sessionNew + " new words, " + sessionXP + " XP, time: " + timeStr + ". " +
              (errList ? "Words with errors: " + errList + ". " : "No errors! Perfect session. ") +
              "All lesson words: " + wordsList + ". " +
              (nextWord ? "Next lesson first word: " + nextWord + ". " : "") +
              "Now: celebrate briefly, identify the main weak point if any, then ask ONE active production question (make a sentence, explain difference, translate) using one of the lesson words. Do NOT answer your own question — wait for the student.";
            var resp = await fetch(DEEPSEEK_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + DEEPSEEK_KEY },
              body: JSON.stringify({ model: "deepseek-v4-pro", max_tokens: 200,
                messages: [{ role: "system", content: getMingSystemPrompt("recap", recapDetail) }, { role: "user", content: "Start the coaching session now." }]
              })
            });
            var data = await resp.json();
            setMingTyping(false);
            var recapRaw = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
            var recapRaw2 = recapRaw && recapRaw.trim().length > 0 ? recapRaw.trim() : xuexueMsg;
            recapRaw2 = recapRaw2.replace(/\*\*([^*]+)\*\*/g, "$1").replace(/\*([^*]+)\*/g, "$1").replace(/^#{1,3}\s+/gm, "");
            recapRaw2 = recapRaw2.replace(/([.!?])\s+([A-ZÀÂÉÈÊËÎÏÔÙÛÜÆŒÇ🎯⚡✍️🧠🐣🐼])/g, "$1\n$2").replace(/  +/g, " ").trim();
            addMingMessage(recapRaw2, false);
          } catch(e) {
            setMingTyping(false);
            addMingMessage(xuexueMsg, false);
          }
          setTimeout(function() {
            var nl = getNextLesson(srsRef.current);
            setMingMessages(function(prev) {
              return prev.concat([{ text: "__postSession__", isUser: false, id: Date.now(), isPostSession: true, nl: nl }]);
            });
          }, 600);
        };

        return (
          <div className="learn-bg" style={{ display: "flex", flexDirection: "column", alignItems: "center", minHeight: "100vh", padding: "0 0 32px", background: "#FFF8F7" }}>

            {/* Header rouge */}
            <div style={{ width: "100%", background: "linear-gradient(135deg, #C41E08, #DE2910)", padding: "12px 20px 14px", display: "flex", alignItems: "center", gap: 10, marginBottom: 0 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", fontWeight: 600 }}>{"L" + lesson.id + " · HSK " + lesson.hsk}</div>
                <div style={{ fontSize: 13, fontWeight: 800, color: "#fff" }}>{isEx ? (lang === "fr" ? "Examen terminé !" : "Exam complete!") : isMile ? (lang === "fr" ? "Révision terminée !" : "Review complete!") : (lang === "fr" ? "Leçon terminée !" : "Lesson complete!")}</div>
              </div>
              <div style={{ background: "#fff", borderRadius: 20, padding: "4px 14px", fontSize: 13, fontWeight: 800, color: "#DE2910" }}>{accuracy}%</div>
            </div>

            {/* Xuéxue + félicitation */}
            <div style={{ width: "100%", display: "flex", alignItems: "flex-end", justifyContent: "center", gap: 0, padding: "0 20px", marginTop: 8 }}>
              <div style={{ flexShrink: 0, marginBottom: -8 }}><svg width="130" height="130" viewBox="0 0 120 120" style={{ filter: "drop-shadow(0 8px 24px rgba(0,0,0,0.15))", animation: "pandaSway 3s ease-in-out infinite", transformOrigin: "bottom center" }}>
                <circle cx="60" cy="60" r="60" fill="#DE2910"/>
                <circle cx="34" cy="26" r="15" fill="#1a1a1a"/>
                <circle cx="86" cy="26" r="15" fill="#1a1a1a"/>
                <circle cx="34" cy="26" r="7" fill="#2d2d2d"/>
                <circle cx="86" cy="26" r="7" fill="#2d2d2d"/>
                <circle cx="60" cy="58" r="34" fill="#fff"/>
                <ellipse cx="45" cy="53" rx="13" ry="12" fill="#1a1a1a" transform="rotate(-8 45 53)"/>
                <ellipse cx="75" cy="53" rx="13" ry="12" fill="#1a1a1a" transform="rotate(8 75 53)"/>
                <circle cx="45" cy="51" r="6" fill="#fff"/>
                <circle cx="75" cy="51" r="6" fill="#fff"/>
                <circle cx="46.5" cy="50" r="3.5" fill="#1a1a1a"/>
                <circle cx="76.5" cy="50" r="3.5" fill="#1a1a1a"/>
                <circle cx="48" cy="48.5" r="1.4" fill="#fff"/>
                <circle cx="78" cy="48.5" r="1.4" fill="#fff"/>
                <circle cx="45.5" cy="52" r="0.6" fill="#fff" opacity="0.6"/>
                <circle cx="75.5" cy="52" r="0.6" fill="#fff" opacity="0.6"/>
                <ellipse cx="60" cy="62" rx="5" ry="3.5" fill="#222"/>
                <path d="M51,69 Q60,78 69,69" fill="none" stroke="#1a1a1a" strokeWidth="2.2" strokeLinecap="round"/>
                <ellipse cx="38" cy="66" rx="9" ry="7" fill="#FF9999" opacity="0.55"/>
                <ellipse cx="82" cy="66" rx="9" ry="7" fill="#FF9999" opacity="0.55"/>
                <ellipse cx="28" cy="80" rx="11" ry="9" fill="#1a1a1a" transform="rotate(20 28 80)"/>
                <ellipse cx="92" cy="80" rx="11" ry="9" fill="#1a1a1a" transform="rotate(-20 92 80)"/>
                <rect x="48" y="76" width="24" height="14" rx="3" fill="#C41E08"/>
                <rect x="49" y="78" width="22" height="2.5" rx="1" fill="#fff" opacity="0.35"/>
              </svg></div>
              <div style={{ flex: 1, background: "#fff", borderRadius: "16px 16px 16px 4px", padding: "14px 16px", boxShadow: "0 4px 16px rgba(0,0,0,0.06)", border: "1px solid #EAE3DA", maxWidth: 220 }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: "#DE2910", marginBottom: 5, letterSpacing: 0.5 }}>XUÉXUE</div>
                <div style={{ fontSize: 12, color: "#1A1410", lineHeight: 1.6 }}>{msg + " " + (lang === "fr" ? "Belle session, continue comme ça !" : "Great session, keep it up!")}</div>
              </div>
            </div>

            {/* Stats */}
            <div style={{ width: "100%", maxWidth: 380, padding: "0 16px", marginTop: 14 }}>
              <div style={{ background: "#fff", borderRadius: 16, padding: "14px 16px", marginBottom: 10, border: "1px solid #EAE3DA" }}>
                <div style={{ display: "flex", justifyContent: "space-around", textAlign: "center" }}>
                  <div><div style={{ fontSize: 22, fontWeight: 800, color: T.green }}>{sessionCorrect}</div><div style={{ fontSize: 9, color: T.textSoft }}>✅ {lang === "fr" ? "correct" : "correct"}</div></div>
                  <div style={{ width: 1, background: "#EAE3DA" }} />
                  <div><div style={{ fontSize: 22, fontWeight: 800, color: "#DE2910" }}>{sessionNew}</div><div style={{ fontSize: 9, color: T.textSoft }}>🆕 {lang === "fr" ? "nouveaux" : "new"}</div></div>
                  <div style={{ width: 1, background: "#EAE3DA" }} />
                  <div><div style={{ fontSize: 22, fontWeight: 800, color: "#3B7BC0" }}>{sessionXP}</div><div style={{ fontSize: 9, color: T.textSoft }}>⭐ XP</div></div>
                  <div style={{ width: 1, background: "#EAE3DA" }} />
                  <div><div style={{ fontSize: 13, fontWeight: 700, color: "#8B7E72", marginTop: 4 }}>{timeStr}</div><div style={{ fontSize: 9, color: T.textSoft }}>⏱ {lang === "fr" ? "durée" : "time"}</div></div>
                </div>
              </div>

              {/* Grille caractères */}
              {items.length > 0 && (
                <div style={{ background: "#fff", borderRadius: 16, padding: "12px 12px", marginBottom: 10, border: "1px solid #EAE3DA" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#8B7E72", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>{lang === "fr" ? "Mots de cette leçon" : "Words from this lesson"}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(" + Math.min(4, items.length) + ", 1fr)", gap: 6 }}>
                    {items.map(function(it, i) { return (
                      <div key={i} style={{ background: "#FFF8F7", borderRadius: 10, padding: "8px 4px", textAlign: "center", border: "1px solid #EAE3DA", animation: "fadeIn 0.2s ease-out " + (i * 0.03) + "s both" }}>
                        <div style={{ fontSize: 20, fontWeight: 600, color: T.text, marginBottom: 1 }}>{it.char}</div>
                        <div style={{ fontSize: 9, color: "#DE2910", fontWeight: 600 }}>{it.pinyin}</div>
                        <div style={{ fontSize: 7, color: T.textSoft, marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{lang === "fr" ? it.fr : (it.en || it.fr)}</div>
                      </div>
                    ); })}
                  </div>
                </div>
              )}

              {/* Bouton principal — continuer avec Xuéxue */}
              <button onClick={handleRecapToXuexue} style={{ width: "100%", padding: "15px 0", background: "linear-gradient(135deg, #DE2910, #FF4433)", border: "none", borderRadius: 16, color: "#fff", fontSize: 15, fontWeight: 800, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 6px 20px rgba(222,41,16,0.35)", marginBottom: 10 }}>
                {lang === "fr" ? "Continuer avec Xuéxue 🐼 →" : "Continue with Xuéxue 🐼 →"}
              </button>

              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={downloadImage} style={{ flex: 1, padding: "11px 0", background: "#fff", border: "1px solid #EAE3DA", borderRadius: 12, cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 600, color: T.text }}>
                  📥 {lang === "fr" ? "Télécharger" : "Download"}
                </button>
                <button onClick={function() { setPhase("ming"); setMingChatOpen(false); }} style={{ flex: 1, padding: "11px 0", background: "#fff", border: "1px solid #EAE3DA", borderRadius: 12, color: T.text, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                  🐼 Xuéxue
                </button>
              </div>
            </div>
          </div>
        );
      })()}


      {phase === "collection" && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minHeight: "100vh", paddingBottom: 72 }}>
          {/* Hero header */}
          <div style={{ width: "100%", background: "linear-gradient(145deg, #C41E08 0%, #DE2910 30%, #E8452A 60%, #FF6B4A 100%)", borderRadius: "0 0 28px 28px", padding: "20px 20px 18px", position: "relative", overflow: "hidden", marginBottom: 12 }}>
            <div style={{ position: "absolute", inset: 0, opacity: 0.04, backgroundImage: "url(\"data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0L40 20L20 40L0 20Z' fill='none' stroke='%23fff' stroke-width='0.5'/%3E%3C/svg%3E\")" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", position: "relative", zIndex: 2 }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#fff" }}>{L.collection}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.7)", marginTop: 2 }}>{discoveredTotal + "/" + ALL_ITEMS.length + " " + (lang === "fr" ? "éléments" : "items")}</div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 50, padding: "4px 12px", fontSize: 13, color: "#fff", fontWeight: 700 }}>{Math.round(discoveredTotal / ALL_ITEMS.length * 100) + "%"}</div>
            </div>
          </div>
          <div style={{ marginBottom: 12 }}>
            <input type="text" value={collSearch} onChange={function(e) { setCollSearch(e.target.value); }} placeholder={lang === "fr" ? "🔍 Chercher..." : "🔍 Search..."} autoComplete="off" style={{ width: "100%", padding: "10px 14px", fontSize: 14, fontFamily: "inherit", background: T.inputBg, border: "1px solid " + T.inputBorder, borderRadius: 10, outline: "none", color: T.text }} />
          </div>
          {[1,2,3].map(function(hsk) {
            var q = collSearch.toLowerCase().trim();
            var nq = normalizePinyin(q);
            var items = ALL_ITEMS.filter(function(c) { return c.hsk === hsk && (q ? (c.char.includes(q) || normalizePinyin(c.pinyin).includes(nq) || (c.fr || "").toLowerCase().includes(q) || (c.en || "").toLowerCase().includes(q)) : (srs[c.id] && srs[c.id].mastery > 0)); });
            var chars = items.filter(function(c) { return c.type === "char"; });
            var words = items.filter(function(c) { return c.type === "word"; });
            if (items.length === 0) return null;
            return (
              <div key={hsk} style={{ marginBottom: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: hskColor(hsk) }}>HSK {hsk}</div>
                  <div style={{ flex: 1, height: 1, background: T.sep }} />
                  <div style={{ fontSize: 10, color: T.textSoft }}>{items.length}</div>
                </div>
                {chars.length > 0 && <div><div style={{ fontSize: 10, color: T.textSoft, marginBottom: 6, fontWeight: 600 }}>{L.collChars}</div><div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", maxWidth: 340, gap: 6, marginBottom: 12 }}>{chars.map(function(c) { var m = srs[c.id] ? srs[c.id].mastery : 0; return <div key={c.id} onClick={function() { setSelectedCard(c); }} style={{ background: T.card, border: "1px solid " + MASTERY_COLORS[m] + "33", borderRadius: 10, padding: "8px 2px", textAlign: "center", cursor: "pointer" }}><div style={{ fontSize: 24, lineHeight: 1, marginBottom: 2 }}>{c.char}</div><div style={{ fontSize: 8, color: T.textSoft, marginBottom: 2 }}>{c.pinyin}</div><MasteryDots level={m} size={3} dimColor={T.dotDim} /></div>; })}</div></div>}
                {words.length > 0 && <div><div style={{ fontSize: 10, color: T.textSoft, marginBottom: 6, fontWeight: 600 }}>{L.collWords}</div><div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", maxWidth: 340, gap: 6, marginBottom: 12 }}>{words.map(function(c) { var m = srs[c.id] ? srs[c.id].mastery : 0; return <div key={c.id} onClick={function() { setSelectedCard(c); }} style={{ background: T.card, border: "1px solid " + MASTERY_COLORS[m] + "33", borderRadius: 10, padding: "8px 6px", textAlign: "center", cursor: "pointer" }}><div style={{ fontSize: 15, lineHeight: 1.2, marginBottom: 2, fontWeight: 500 }}>{c.char}</div><div style={{ fontSize: 8, color: T.textSoft, marginBottom: 2 }}>{c.pinyin}</div><MasteryDots level={m} size={3} dimColor={T.dotDim} /></div>; })}</div></div>}
              </div>
            );
          })}
          {selectedCard && (
            <div onClick={function() { setSelectedCard(null); }} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24, animation: "fadeIn 0.2s ease-out" }}>
              <div onClick={function(e) { e.stopPropagation(); }} style={{ width: "100%", maxWidth: 340, background: T.card, borderRadius: 20, padding: "28px 24px", textAlign: "center", maxHeight: "80vh", overflowY: "auto", animation: "scaleIn 0.25s ease-out" }}>
                <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}><button onClick={function() { setSelectedCard(null); }} style={{ background: "none", border: "none", fontSize: 18, color: T.textSoft, cursor: "pointer" }}>✕</button></div>
                <div style={{ fontSize: selectedCard.type === "word" ? (selectedCard.char.length > 3 ? 36 : 48) : 80, lineHeight: 1, color: T.text, marginBottom: 8 }}>{selectedCard.char}</div>
                <div style={{ marginBottom: 12 }}><SpeakBtn text={selectedCard.char} size={36} /></div>
                <div style={{ fontSize: 22, color: T.accent, fontWeight: 500, marginBottom: 8 }}>{selectedCard.pinyin}</div>
                <div style={{ fontSize: 16, color: T.textMuted }}>{lang === "fr" ? selectedCard.fr : (selectedCard.en || selectedCard.fr)}</div>
                {selectedCard.type !== "word" && selectedCard.words && <div><div style={{ height: 1, background: T.sep, margin: "14px 0 10px" }} /><div style={{ fontSize: 10, fontWeight: 600, color: T.textSoft, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>{L.collExamples}</div>{selectedCard.words.map(function(w, i) { return <div key={i} style={{ fontSize: 14, color: T.textMuted, lineHeight: 2 }}>{translateWord(w, lang)}</div>; })}</div>}
                <div style={{ display: "inline-block", marginTop: 12, padding: "3px 10px", background: hskColor(selectedCard.hsk) + "22", borderRadius: 6, fontSize: 11, fontWeight: 600, color: hskColor(selectedCard.hsk) }}>HSK {selectedCard.hsk}</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(HanziSwipe));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/Hanzi-swipe/sw.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.log('SW error:', err); });
      });
    }
  </script>
</body>
</html>
